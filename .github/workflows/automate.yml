name: Generar Briefing Diario

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crear-informe:
    runs-on: ubuntu-latest
    steps:
    - name: Descargar el código
      uses: actions/checkout@v4

    - name: Preparar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Instalar herramientas
      run: pip install -r requirements.txt

    - name: Ejecutar script principal
  env:
    DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    run: python main.py

    - name: Guardar archivos y publicar
      run: |
        git config --global user.name "Bot Financiero"
        git config --global user.email "bot@ejemplo.com"
        git add .
        git commit -m "Briefing publicado: $(date +'%Y-%m-%d')" || echo "Sin cambios"
        git push
